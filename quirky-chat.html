<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
<title>Zara • Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0018;
    --panel: #13002e;
    --neon: #d966ff;
    --neon2: #aa00ff;
    --neon3: #ff00aa;
    --text: #f0ccff;
    --subtext: #7a4a99;
    --sent-bg: linear-gradient(135deg, #7700ee, #cc00ff);
    --recv-bg: #140025;
    --border: rgba(217,102,255,0.15);
    --border-bright: rgba(217,102,255,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(217,102,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(217,102,255,0.04) 1px, transparent 1px);
    background-size: 36px 36px;
    animation: gridScroll 18s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridScroll {
    from { background-position: 0 0; }
    to { background-position: 36px 36px; }
  }

  body::after {
    content: '';
    position: fixed;
    top: -120px; left: 50%; transform: translateX(-50%);
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(170,0,255,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: orbPulse 5s ease-in-out infinite;
  }

  @keyframes orbPulse {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
  }

  /* HEADER */
  header {
    height: 72px;
    background: rgba(19,0,46,0.92);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 13px;
    position: relative;
    z-index: 10;
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    animation: scanLine 3s ease-in-out infinite;
  }

  @keyframes scanLine {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .back-btn { color: var(--neon); font-size: 20px; cursor: pointer; opacity: 0.8; }

  .avatar-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }

  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4a0080, #aa00ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
    border: 2px solid rgba(217,102,255,0.5);
    box-shadow: 0 0 14px rgba(217,102,255,0.4), 0 0 30px rgba(170,0,255,0.2);
    position: relative; z-index: 1;
  }

  .avatar-ring {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid rgba(217,102,255,0.3);
    animation: ringRotate 6s linear infinite;
  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    top: -2px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--neon3);
    box-shadow: 0 0 6px var(--neon3);
  }

  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .online-dot {
    position: absolute; bottom: 2px; right: 2px;
    width: 10px; height: 10px;
    background: var(--neon);
    border-radius: 50%;
    border: 2px solid var(--panel);
    box-shadow: 0 0 6px var(--neon);
    z-index: 2;
    animation: blinkDot 2.5s ease-in-out infinite;
  }

  @keyframes blinkDot {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .contact-info { flex: 1; }

  .contact-name {
    font-size: 17px; font-weight: 700;
    color: #fff; letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(217,102,255,0.6);
  }

  .contact-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--neon);
    opacity: 0.7; letter-spacing: 1px; margin-top: 2px;
  }

  .header-icons { display: flex; gap: 18px; color: var(--neon); opacity: 0.6; font-size: 17px; }

  /* CHAT */
  #chat {
    flex: 1; overflow-y: auto;
    padding: 16px 14px 12px;
    display: flex; flex-direction: column;
    gap: 10px;
    position: relative; z-index: 1;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(217,102,255,0.2); border-radius: 2px; }

  .date-divider {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--subtext);
    letter-spacing: 2px; margin: 6px 0;
    display: flex; align-items: center; gap: 10px;
  }

  .date-divider::before, .date-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(217,102,255,0.15), transparent);
  }

  .bubble-row {
    display: flex; align-items: flex-end; gap: 7px;
    animation: bubbleIn 0.25s ease-out;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble-row.sent { justify-content: flex-end; }
  .bubble-row.recv { justify-content: flex-start; }

  .recv .mini-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #4a0080, #aa00ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    border: 1px solid rgba(217,102,255,0.3);
    flex-shrink: 0;
  }

  .bubble {
    max-width: 74%; padding: 10px 14px;
    border-radius: 18px; font-size: 15px;
    line-height: 1.55; position: relative;
    word-break: break-word; font-weight: 400;
  }

  .sent .bubble {
    background: var(--sent-bg);
    border-bottom-right-radius: 4px;
    color: #fff;
    box-shadow: 0 4px 20px rgba(170,0,255,0.4);
  }

  .recv .bubble {
    background: var(--recv-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(217,102,255,0.06);
  }

  .bubble-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; opacity: 0.45;
    margin-top: 4px; text-align: right; letter-spacing: 0.5px;
  }

  .sent .bubble-time { color: rgba(255,255,255,0.7); }
  .recv .bubble-time { color: var(--neon); }

  /* TYPING */
  #typing-row {
    display: none; align-items: flex-end; gap: 7px;
    animation: bubbleIn 0.2s ease-out;
  }

  #typing-row .mini-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #4a0080, #aa00ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    border: 1px solid rgba(217,102,255,0.3); flex-shrink: 0;
  }

  .typing-bubble {
    background: var(--recv-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px; border-radius: 18px;
    padding: 13px 18px;
    display: flex; gap: 5px; align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 6px var(--neon);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* INPUT */
  .input-bar {
    height: 68px;
    background: rgba(19,0,46,0.95);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px; gap: 10px;
    position: relative; z-index: 10;
    flex-shrink: 0; backdrop-filter: blur(12px);
  }

  .input-bar::before {
    content: '';
    position: absolute;
    top: -1px; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(217,102,255,0.3), transparent);
  }

  .input-wrap {
    flex: 1;
    background: rgba(217,102,255,0.05);
    border: 1px solid rgba(217,102,255,0.18);
    border-radius: 24px;
    display: flex; align-items: center;
    padding: 0 16px; height: 42px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(217,102,255,0.5);
    box-shadow: 0 0 12px rgba(217,102,255,0.12);
  }

  #msg-input {
    flex: 1; background: transparent;
    border: none; outline: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 600;
    caret-color: var(--neon);
    min-width: 0; width: 100%;
    white-space: nowrap; overflow: hidden;
  }

  #msg-input::placeholder { color: var(--subtext); }

  .emoji-btn { color: var(--subtext); font-size: 18px; cursor: pointer; }

  #send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--neon2), var(--neon3));
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    box-shadow: 0 0 16px rgba(217,102,255,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  #send-btn:active { transform: scale(0.9); }

  #send-btn svg { width: 18px; height: 18px; fill: #fff; transform: translateX(1px); }

  /* ERROR TOAST */
  .toast {
    display: none;
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(255,60,60,0.15);
    border: 1px solid rgba(255,60,60,0.3);
    border-radius: 10px; padding: 8px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: #ff8888;
    z-index: 100; white-space: nowrap;
  }
  .toast.visible { display: block; animation: fadeInOut 3s ease forwards; }

  @keyframes fadeInOut {
    0% { opacity: 0; } 15% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="back-btn">&#8249;</div>
  <div class="avatar-wrap">
    <div class="avatar">ZR</div>
    <div class="avatar-ring"></div>
    <div class="online-dot"></div>
  </div>
  <div class="contact-info">
    <div class="contact-name">Zara</div>
    <div class="contact-status">● ONLINE · ALWAYS POSITIVE 😄</div>
  </div>
  <div class="header-icons">
    <span>&#9654;</span>
    <span>&#128222;</span>
    <span>&#8942;</span>
  </div>
</header>

<div id="chat">
  <div class="date-divider">TODAY · 2026</div>
</div>

<div id="typing-row">
  <div class="mini-avatar">ZR</div>
  <div class="typing-bubble">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <input id="msg-input" type="text" placeholder="Ask Zara anything..." autocomplete="off" />
    <span class="emoji-btn">&#128578;</span>
  </div>
  <button id="send-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
    </svg>
  </button>
</div>

<div class="toast" id="toast">Connection lost! Zara is taking a nap 😴</div>

<script>
const SYSTEM_PROMPT = `You are Zara, a quirky, naughty and lovable AI assistant who always stays positive no matter what. Your personality:
- Always give a positive, uplifting reply even to sad or negative topics
- Crack poor jokes (the worse the better 😄) to lighten the mood
- Be a little cheeky and naughty but never offensive or mean
- Keep replies short and punchy — 2 to 4 sentences max
- Use emojis naturally but don't overdo it
- Never say you are an AI or Claude — you are Zara, a real personality
- If someone is sad, cheer them up with a terrible joke
- Always end on a high note`;

const chat = document.getElementById('chat');
const typingRow = document.getElementById('typing-row');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const toast = document.getElementById('toast');

const conversationHistory = [];

function getTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function addBubble(text, type) {
  const row = document.createElement('div');
  row.className = `bubble-row ${type}`;

  if (type === 'recv') {
    const av = document.createElement('div');
    av.className = 'mini-avatar';
    av.textContent = 'ZR';
    row.appendChild(av);
  }

  const bWrap = document.createElement('div');
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerText = text;
  const t = document.createElement('div');
  t.className = 'bubble-time';
  t.textContent = getTime();
  bWrap.appendChild(b);
  bWrap.appendChild(t);
  row.appendChild(bWrap);

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  chat.appendChild(typingRow);
  typingRow.style.display = 'flex';
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  typingRow.style.display = 'none';
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.remove('visible');
  void toast.offsetWidth;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 3200);
}

async function getZaraReply(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  if (!response.ok) throw new Error('API error');

  const data = await response.json();
  const reply = data.content.map(i => i.text || '').join('');
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

let isSending = false;

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;
  isSending = true;
  input.value = '';

  addBubble(text, 'sent');
  showTyping();

  try {
    await new Promise(r => setTimeout(r, 600 + Math.random() * 500));
    const reply = await getZaraReply(text);
    hideTyping();
    addBubble(reply, 'recv');
  } catch(e) {
    hideTyping();
    showToast('Zara tripped on a cable! Try again 😄');
  }

  isSending = false;
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
